<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>GTA Veri</title>
</head>
<body>
    <h1>GTA Haftalık Araçlar</h1>
    <div id="sonuc">Veri çekiliyor...</div>

    <script>
        const targetUrl = "https://gtaweekly.com/api/v1/weekly";
        const proxyUrl = "https://corsproxy.io/?" + encodeURIComponent(targetUrl);

        fetch(proxyUrl)
            .then(res => res.json())
            .then(data => {
                document.getElementById('sonuc').innerHTML = "<pre>" + JSON.stringify(data, null, 2) + "</pre>";
            })
            .catch(err => {
                document.getElementById('sonuc').innerText = "Hata oluştu, konsola bak!";
                console.error(err);
            });
    </script>
</body>
</html>
